server:
  host: "0.0.0.0"
  port: {{.server_port}}
  mode: "debug"
  read_timeout: 30
  write_timeout: 30

database:
  driver: "sqlite"
  # SQLite 配置：文件路径或 ":memory:" 表示内存数据库
  db_name: "./data/app.db"

{{- if .enable_redis}}
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
{{- end}}

log:
  level: "info"
  filename: ""
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true

app:
  name: "{{.project_name}}"
  version: "1.0.0"
